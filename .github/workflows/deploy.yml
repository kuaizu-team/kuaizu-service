name: Deploy to Server

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SSH_PORT || 22 }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Set image version
        run: |
          VERSION="${{ github.ref_name }}"
          echo "VERSION=${VERSION//\//-}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          export COMMIT=${{ github.sha }}
          docker build \
            --build-arg VERSION=$VERSION \
            --build-arg COMMIT=$COMMIT \
            -t kuaizu-server:$VERSION .
          # 同时标记为 latest 方便 compose 使用
          docker tag kuaizu-server:$VERSION kuaizu-server:latest

      - name: Save Docker image to tarball
        run: |
          docker save kuaizu-server:$VERSION | gzip > kuaizu-server.tar.gz

      - name: Transfer image and config to server
        run: |
          # 创建目录
          ssh -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p ~/kuaizu-server"
          
          # 传输镜像打包文件 (使用 scp 不需要 rsync)
          scp -P ${{ secrets.SSH_PORT || 22 }} kuaizu-server.tar.gz ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/kuaizu-server/
          
          # 传输 docker-compose.yml
          scp -P ${{ secrets.SSH_PORT || 22 }} docker-compose.yml ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/kuaizu-server/

      - name: Create .env.docker on server
        run: |
          ssh -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd ~/kuaizu-server
            cat > .env.docker << 'ENVEOF'
          ${{ secrets.ENV_DOCKER }}
          ENVEOF
          EOF

      - name: Load image and restart services
        run: |
          ssh -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd ~/kuaizu-server
            
            # 加载镜像 (从压缩包)
            gunzip -c kuaizu-server.tar.gz | docker load
            
            # 使用环境变量传递版本信息
            export VERSION=${{ env.VERSION }}
            
            # 重启服务
            docker-compose down
            docker-compose up -d
            docker-compose ps
            
            # 清理临时文件
            rm kuaizu-server.tar.gz
          EOF

      - name: Cleanup old images
        run: |
          ssh -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            docker image prune -f
          EOF
