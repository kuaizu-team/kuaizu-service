parameters:
  - $ref: ../components/parameters/PageParam.yaml
  - $ref: ../components/parameters/SizeParam.yaml
  - name: status
    in: query
    description: |
      项目状态筛选，支持单值和多值。
      多值时使用逗号分隔，例如 `status=0,1`，表示返回任一状态的项目。
    style: form
    explode: false
    schema:
      type: array
      items:
        $ref: ../components/schemas/ProjectStatus.yaml
    example: "0,1"
get:
  tags:
    - ProjectApplications
  summary: 列出我组建的项目
  description: |
    返回组队者的项目数据。

    支持使用 `status=0,1` 这样的逗号分隔形式筛选多个状态，语义为“满足任一状态即可”。
  operationId: listMyProjects
  responses:
    '200':
      description: 成功
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../components/schemas/BaseResponse.yaml
              - type: object
                properties:
                  data:
                    type: object
                    properties:
                      list:
                        type: array
                        items:
                          $ref: ../components/schemas/ProjectVO.yaml
                      pageInfo:
                        $ref: ../components/schemas/PageInfo.yaml
