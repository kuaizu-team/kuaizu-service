patch:
  tags:
    - TalentProfiles
  summary: 审核人才档案
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: integer
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - status
          properties:
            status:
              type: integer
              description: 审核状态（1=通过，0=驳回并设为隐私）
              enum:
                - 1
                - 0
  responses:
    '200':
      description: 审核成功
      content:
        application/json:
          schema:
            $ref: ../components/schemas/BaseResponse.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '500':
      $ref: ../components/responses/InternalError.yaml
