put:
  tags:
    - TalentProfiles
  summary: 下架已上架名片
  description: |
    强制将 status=1（上架）的名片设为 status=0（隐私/下架）。
    与「审核驳回」不同，此操作针对已上架的名片，可随时执行。
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: integer
      description: 名片ID
  responses:
    '200':
      description: 下架成功
      content:
        application/json:
          schema:
            $ref: ../components/schemas/BaseResponse.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '500':
      $ref: ../components/responses/InternalError.yaml
