type: object
properties:
  id:
    type: integer
    description: 名片ID
  userId:
    type: integer
    description: 关联用户ID
  nickname:
    type: string
    nullable: true
    description: 昵称
  avatarUrl:
    type: string
    nullable: true
    description: 头像URL（完整路径）
  schoolName:
    type: string
    nullable: true
    description: 学校名称
  majorName:
    type: string
    nullable: true
    description: 专业名称
  grade:
    type: integer
    nullable: true
    description: 入学年份
  skills:
    type: array
    nullable: true
    items:
      type: string
    description: 技能标签列表
  mbti:
    type: string
    nullable: true
    description: MBTI 性格类型
  status:
    type: integer
    description: |
      名片状态：
        0 = 隐私/已驳回（用户自行隐私 或 管理员审核驳回）
        1 = 已上架
        2 = 审核中（等待管理员审核）
        3 = 已下架（管理员对已上架名片强制下架）
    enum: [0, 1, 2, 3]
  authStatus:
    type: integer
    nullable: true
    description: 用户认证状态（0=未认证 1=已认证 2=认证失败）
  createdAt:
    type: string
    format: date-time
    nullable: true
  updatedAt:
    type: string
    format: date-time
    nullable: true
